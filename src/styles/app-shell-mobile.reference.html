<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>TB-FO Assistant Shell</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&amp;family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#e0f2ea",
                        "outline-variant": "#bec9c1",
                        "error": "#ba1a1a",
                        "surface-container-high": "#dbece4",
                        "primary-fixed": "#9ef4cc",
                        "on-tertiary": "#ffffff",
                        "secondary": "#006c4c",
                        "on-tertiary-fixed": "#001d34",
                        "on-tertiary-container": "#c4dfff",
                        "on-secondary-container": "#007150",
                        "on-secondary-fixed-variant": "#005138",
                        "secondary-fixed": "#92f6c9",
                        "tertiary-container": "#346490",
                        "tertiary-fixed": "#cfe4ff",
                        "primary-fixed-dim": "#83d7b1",
                        "on-error": "#ffffff",
                        "background": "#ecfdf5",
                        "on-surface": "#0f1e1a",
                        "on-surface-variant": "#3f4943",
                        "on-primary-fixed": "#002115",
                        "inverse-surface": "#24332e",
                        "inverse-on-surface": "#e3f5ed",
                        "tertiary-fixed-dim": "#9dcbfc",
                        "on-primary": "#ffffff",
                        "on-background": "#0f1e1a",
                        "surface-container-low": "#e6f8ef",
                        "secondary-container": "#8ff3c6",
                        "error-container": "#ffdad6",
                        "surface": "#ecfdf5",
                        "secondary-fixed-dim": "#75d9ae",
                        "tertiary": "#154c77",
                        "inverse-primary": "#83d7b1",
                        "surface-container-highest": "#d5e6df",
                        "on-primary-fixed-variant": "#005139",
                        "surface-variant": "#d5e6df",
                        "surface-bright": "#ecfdf5",
                        "surface-dim": "#cdded6",
                        "on-primary-container": "#98edc6",
                        "primary": "#00543b",
                        "surface-tint": "#046c4d",
                        "primary-container": "#0a6e4f",
                        "on-secondary-fixed": "#002114",
                        "on-tertiary-fixed-variant": "#124a74",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#6f7a73",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "sm": "8px",
                        "xs": "4px",
                        "base": "4px",
                        "gutter": "16px",
                        "margin_mobile": "16px",
                        "lg": "24px",
                        "md": "16px",
                        "margin_desktop": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Hind Siliguri"],
                        "mono-id": ["JetBrains Mono"],
                        "body-lg": ["Hind Siliguri"],
                        "h1": ["Hind Siliguri"],
                        "h2": ["Hind Siliguri"],
                        "label-caps": ["Inter"],
                        "numeric-data": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "mono-id": ["13px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "h1": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "h2": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "numeric-data": ["14px", { "lineHeight": "20px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Ambient shadows and component specific styling */
        .card-level-1 {
            box-shadow: 0 2px 4px rgba(28, 43, 38, 0.05);
            border: 1px solid #CCDDD6;
        }
        .fab-level-2 {
            box-shadow: 0 8px 16px rgba(28, 43, 38, 0.12);
        }
        .app-container {
            max-width: 390px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: #EEF4F1; /* Level 0 Canvas */
            position: relative;
            overflow-x: hidden;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased">
<div class="app-container flex flex-col relative pb-20"> <!-- pb-20 to clear bottom nav -->
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim text-primary dark:text-primary-fixed-dim docked full-width top-0 sticky border-b border-outline-variant dark:border-outline bg-surface/95 backdrop-blur-md z-50 flex justify-between items-center px-margin_mobile md:px-margin_desktop py-sm w-full">
<div class="flex flex-col">
<h1 class="font-h1 text-h1 font-bold text-primary dark:text-primary-fixed-dim">TB-FO Assistant</h1>
<span class="font-label-caps text-label-caps text-on-surface-variant">TB Control Field Workflow</span>
</div>
<div class="flex items-center gap-sm">
<button aria-label="Sync" class="p-xs text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="sync">sync</span>
</button>
<button aria-label="Notifications" class="p-xs text-on-surface-variant hover:bg-surface-container-high transition-colors rounded-full relative">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="absolute top-1 right-1 w-2 h-2 bg-error rounded-full"></span>
</button>
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-label-caps text-label-caps ml-xs">
                FO
            </div>
</div>
</header>
<!-- Main Content Canvas (Empty state for shell demonstration) -->
<main class="flex-grow p-margin_mobile flex flex-col gap-md">
<!-- Status Indicators Area -->
<div class="flex justify-between items-center bg-surface-container-low p-sm rounded-lg border border-outline-variant card-level-1">
<div class="flex items-center gap-xs text-primary-container">
<span class="material-symbols-outlined text-sm" data-icon="cloud_done">cloud_done</span>
<span class="font-label-caps text-label-caps">Offline Ready</span>
</div>
<div class="flex items-center gap-xs text-outline">
<span class="material-symbols-outlined text-sm" data-icon="sync_problem">sync_problem</span>
<span class="font-label-caps text-label-caps">Sync Pending (3)</span>
</div>
</div>
<!-- Placeholder Content to show scrolling -->
<div class="bg-surface rounded-lg p-md card-level-1 flex flex-col gap-sm mt-md">
<h2 class="font-h2 text-h2 text-primary">Shell Content Area</h2>
<p class="font-body-md text-on-surface-variant">This area represents the main canvas. Content like patient lists or DOT calendars will render here.</p>
</div>
<div class="bg-surface rounded-lg p-md card-level-1 flex flex-col gap-sm h-32 opacity-50"></div>
<div class="bg-surface rounded-lg p-md card-level-1 flex flex-col gap-sm h-32 opacity-30"></div>
<div class="bg-surface rounded-lg p-md card-level-1 flex flex-col gap-sm h-32 opacity-20"></div>
</main>
<!-- Floating Action Button (FAB) -->
<button class="fixed bottom-[88px] right-margin_mobile bg-primary-container text-on-primary rounded-xl px-md py-sm flex items-center gap-xs fab-level-2 z-40 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span class="font-label-caps text-label-caps">নতুন রোগী</span>
</button>
<!-- Toast Notification (Example) -->
<div class="fixed bottom-[140px] left-1/2 transform -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-md py-sm rounded-lg font-body-md text-sm flex items-center gap-sm z-50 shadow-lg w-[300px]">
<span class="material-symbols-outlined text-primary-fixed" data-icon="offline_pin">offline_pin</span>
        Changes saved offline
    </div>
<!-- BottomNavBar -->
<nav class="bg-surface dark:bg-surface-container-lowest text-primary dark:text-primary-fixed-dim font-label-caps text-label-caps docked full-width bottom-0 rounded-t-xl shadow-lg bg-surface dark:bg-surface-container-lowest shadow-[0_-4px_6px_-1px_rgba(28,43,38,0.05)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-xs pb-sm md:hidden max-w-[390px] mx-auto right-0 border-t-0">
<!-- Tab 1: Dashboard (Active) -->
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 hover:bg-surface-container-high Active: scale-95 transition-transform flex-1">
<span class="material-symbols-outlined mb-1" data-icon="dashboard" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="truncate w-full text-center" style="font-size: 10px;">ড্যাশবোর্ড</span>
</button>
<!-- Tab 2: Patients (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high Active: scale-95 transition-transform flex-1 px-1 py-1">
<span class="material-symbols-outlined mb-1" data-icon="group">group</span>
<span class="truncate w-full text-center" style="font-size: 10px;">রোগী</span>
</button>
<!-- Tab 3: Today (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high Active: scale-95 transition-transform flex-1 px-1 py-1">
<span class="material-symbols-outlined mb-1" data-icon="event_upcoming">event_upcoming</span>
<span class="truncate w-full text-center" style="font-size: 10px;">আজকের কাজ</span>
</button>
<!-- Tab 4: Diary (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high Active: scale-95 transition-transform flex-1 px-1 py-1">
<span class="material-symbols-outlined mb-1" data-icon="auto_stories">auto_stories</span>
<span class="truncate w-full text-center" style="font-size: 10px;">ডায়েরি</span>
</button>
<!-- Tab 5: Reports (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high Active: scale-95 transition-transform flex-1 px-1 py-1">
<span class="material-symbols-outlined mb-1" data-icon="bar_chart">bar_chart</span>
<span class="truncate w-full text-center" style="font-size: 10px;">রিপোর্ট</span>
</button>
</nav>
</div>
</body></html>
